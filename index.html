<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Builder</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🍽️ Menu Builder</h1>
    <p>اصنع منيو احترافي خلال دقائق</p>
</header>

<div class="container">

    <div class="card">

        <label>اسم المطعم</label>
        <input id="restaurantName" type="text" placeholder="اكتب اسم المطعم">

        <label>شعار المطعم</label>
        <input type="file">

        <button>إنشاء المنيو</button>

    </div>

    <div class="preview">

        <h2 id="title">اسم المطعم</h2>

        <div class="menu-box">

            <h3>🍔 البركر</h3>

            <div class="item">
                <span>بركر لحم</span>
                <span>7000 د.ع</span>
            </div>

            <div class="item">
                <span>بركر دجاج</span>
                <span>6000 د.ع</span>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
